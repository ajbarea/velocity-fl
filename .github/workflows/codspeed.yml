name: CodSpeed

on:
  # research(2026-05): safe to path-filter only because vFL has no required
  # CodSpeed check. A path-skipped *required* check hangs at "waiting for
  # status" and blocks merge (GH community #44490). Triggers are limited to
  # code that can actually move a benchmark, so docs/config PRs skip the run.
  push:
    branches: [main]
    paths:
      - "vfl-core/**"
      - "python/**"
      - "tests/bench/**"
      - "**/Cargo.toml"
      - "Cargo.lock"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/codspeed.yml"
  pull_request:
    branches: [main]
    paths:
      - "vfl-core/**"
      - "python/**"
      - "tests/bench/**"
      - "**/Cargo.toml"
      - "Cargo.lock"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/codspeed.yml"
  # `workflow_dispatch` allows CodSpeed to trigger backtest
  # performance analysis in order to generate initial data.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust-benchmarks:
    name: Rust benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Set up uv (with Python)
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"

      - name: Install cargo-codspeed
        run: cargo install cargo-codspeed --locked

      - name: Build benchmarks
        run: cargo codspeed build -p vfl-core

      - name: Run benchmarks
        uses: CodSpeedHQ/action@3194d9a39c4d46684cb44bf7207fc56626aad8fd # v4.15.1
        with:
          mode: simulation
          run: cargo codspeed run

  python-benchmarks:
    name: Python benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Set up uv (with Python)
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Build Rust extension
        run: uv run maturin develop --release

      - name: Run benchmarks
        uses: CodSpeedHQ/action@3194d9a39c4d46684cb44bf7207fc56626aad8fd # v4.15.1
        with:
          mode: simulation
          # research(2026-05): per-PR is a fast SMOKE SUBSET (Rust hot path at
          # tiny+medium). The `large` 10M tier + pure-Python baseline are
          # excluded: regressions already show at medium, and those cells exist
          # for the docs/benchmarks.md speedup numbers, not as a PR gate (they
          # are the ~1h32m Valgrind-simulation sink). Walltime would run them
          # fast, but CodSpeed Macro Runners are GitHub-org-only and vFL is a
          # personal repo, so simulation is the only option. Refresh docs
          # numbers on demand via `make bench` / workflow_dispatch (full suite).
          run: uv run pytest tests/bench/ --codspeed -k "not large and not python_aggregate"
