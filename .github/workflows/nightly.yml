name: Nightly examples

# Runs the full end-to-end examples on real datasets (MNIST, etc.) every night
# and on manual dispatch. These are deliberately excluded from the fast CI in
# `tests.yml` because they download data, take minutes, and exercise the torch
# path — the convergence-floor asserts in each example are what keep silent
# regressions from shipping.

on:
  schedule:
    - cron: "17 7 * * *"   # 07:17 UTC daily (off-peak, non-overlapping with Tests)
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  examples:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # No git push / fetch / network ops happen later in this job;
          # leaving GITHUB_TOKEN in `.git/config` after checkout is a
          # gratuitous credential window. Drop persistence.
          persist-credentials: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Set up uv (with Python)
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install project with torch + hf extras
        # `--no-install-project` skips building velocity-fl during sync.
        # The next step (`maturin develop --release`) is what we actually
        # want -- a release build, not the throwaway debug one uv would
        # otherwise produce. Saves ~10s of Rust compile per run.
        run: uv sync --extra torch --extra hf --no-install-project

      - name: Build Rust extension (release)
        run: uv run maturin develop --release --uv

      - name: Hermetic convergence tests (shard + Dirichlet, no network)
        run: uv run pytest tests/test_convergence.py -v

      - name: Cache Hugging Face datasets (MNIST + CIFAR-10)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/huggingface
          key: hf-datasets-mnist-cifar10-v1

      - name: Paper-cited attack scenarios on real MNIST (label-flip / IPM / Gaussian)
        run: uv run pytest tests/test_paper_attacks_nightly.py --run-nightly -v

      - name: Run MNIST FedAvg example (shard non-IID baseline)
        run: uv run python examples/mnist_fedavg.py

      - name: Run MNIST FedProx example (Dirichlet non-IID)
        run: uv run python examples/mnist_fedprox_dirichlet.py

      - name: Run MNIST Multi-Krum vs Byzantine example
        run: uv run python examples/mnist_multikrum_vs_byzantine.py

      - name: Run MNIST label-flipping vs robust aggregation example
        run: uv run python examples/mnist_label_flipping_vs_robust.py

      - name: Run CIFAR-10 FedAvg Dirichlet example
        run: uv run python examples/cifar10_fedavg_dirichlet.py
