name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          # No git push / fetch / network ops happen later in this job;
          # leaving GITHUB_TOKEN in `.git/config` after checkout is a
          # gratuitous credential window. Drop persistence.
          persist-credentials: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2.9.1

      - name: Set up uv (with Python)
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install project + dev dependencies
        # Install the `hf` and `torch` extras so `test_datasets.py` and
        # `test_convergence.py` (both `pytest.importorskip`-gated on
        # `torch` / `datasets`) collect and run. Without them the HF
        # loader + convergence suites skip at collection and their code
        # paths go uncovered in the Codecov upload.
        run: uv sync --extra hf --extra torch

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Type check (ty, non-blocking)
        continue-on-error: true
        run: uv run ty check python/

      - name: Rust format check
        run: cargo fmt --all -- --check

      - name: Rust lint (clippy)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Rust tests
        run: cargo test --all

      - name: Python tests with coverage
        run: |
          uv run pytest tests/ -v \
            --cov=velocity \
            --cov-report=xml:coverage.xml \
            --junitxml=junit.xml \
            -o junit_family=legacy

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6.0.1
        with:
          files: coverage.xml
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          disable_search: true

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6.0.1
        with:
          files: junit.xml
          report_type: test_results
          token: ${{ secrets.CODECOV_TOKEN }}
          disable_search: true