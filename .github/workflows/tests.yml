name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # No git push / fetch / network ops happen later in this job;
          # leaving GITHUB_TOKEN in `.git/config` after checkout is a
          # gratuitous credential window. Drop persistence.
          persist-credentials: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Set up uv (with Python)
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install project + dev dependencies
        # Install the `hf` and `torch` extras so `test_datasets.py` and
        # `test_convergence.py` (both `pytest.importorskip`-gated on
        # `torch` / `datasets`) collect and run. Without them the HF
        # loader + convergence suites skip at collection and their code
        # paths go uncovered in the Codecov upload.
        run: uv sync --extra hf --extra torch

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Type check (ty, non-blocking)
        continue-on-error: true
        run: uv run ty check python/

      - name: Rust format check
        run: cargo fmt --all -- --check

      - name: Rust lint (clippy)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Rust tests
        run: cargo test --all

      - name: Python tests with coverage
        run: |
          uv run pytest tests/ -v \
            --cov=velocity \
            --cov-report=xml:coverage.xml \
            --junitxml=junit.xml \
            -o junit_family=legacy

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage.xml
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          disable_search: true

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: junit.xml
          report_type: test_results
          token: ${{ secrets.CODECOV_TOKEN }}
          disable_search: true