# Canonical config: techne templates/dependabot.yml.example. /techne:sisters
# audits drift. vFL: uv + cargo (workspace-aware at root) + github-actions.
version: 2

updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels: ["dependencies"]
    # cooldown: hold new releases 7d (supply-chain); security updates bypass it.
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      uv:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels: ["dependencies"]
    # cooldown: hold new releases 7d (supply-chain); security updates bypass it.
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      cargo:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels: ["dependencies"]
    # SHA-pinned actions get version updates (not security alerts); cooldown holds
    # a freshly-published release 7 days so a compromise can surface before the bump.
    cooldown:
      default-days: 7
    commit-message:
      prefix: "ci(deps)"
      include: "scope"
    groups:
      github-actions:
        patterns: ["*"]
        update-types: ["minor", "patch"]
